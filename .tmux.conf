# Set prefix to Alt+q
set -g prefix M-q
unbind C-b
bind M-q send-prefix

# Optional: help with pane splitting/navigation if using Alt
set -g xterm-keys on
# After pressing Alt+q...
bind v split-window -v -c "~"   # Split top/bottom
bind s split-window -h -c "~"  # Split left/right
# Create a new window starting in Home
bind n new-window -c "~"
# Cycle to the next window with Prefix + Tab
bind Tab next-window
# Disable all mouse support
set -g mouse off
# Enter copy mode and scroll up with Alt+Up (no prefix needed)
bind -n M-Up copy-mode
# Increase scrollback buffer to 10,000 lines
set -g history-limit 10000
# Enable automatic window renaming
setw -g allow-rename on
setw -g automatic-rename on

# Set the rename interval (optional, defaults to 5s, 1s is more responsive)
set -g status-interval 1

# Rename the window to the current process (e.g., 'vim', 'bash')
set-window-option -g automatic-rename-format "#{pane_current_command}"
# Remove delay for escaping (crucial for Vim users)
set -s escape-time 0
# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Modern Status Bar Configuration
set -g status-position bottom       # Position at the bottom (default)
set -g status-justify left          # Align window list to the left
set -g status-style 'bg=#282c34 fg=#abb2bf' # Dark background, light gray text

# Left side: Show session name in a highlight box
set -g status-left '#[bg=#61afef,fg=#282c34,bold] #S #[bg=default,fg=#61afef] '
set -g status-left-length 20

# Right side: Show Date and Time
set -g status-right "#[fg=brightgreen]CPU: #(top -bn1 | grep 'Cpu(s)' | awk '{print $2}')% | RAM: #(free -m | awk '/Mem/{printf \"%.1f%%\", $3/$2*100}') | %Y-%m-%d | %H:%M "
set -g status-right-length 100
set -g status-interval 5
# Current Window tab styling (Focused)
setw -g window-status-current-style 'fg=#e06c75,bold'
setw -g window-status-current-format ' #I:#W* '

# Inactive Window tab styling
setw -g window-status-style 'fg=#5c6370'
setw -g window-status-format ' #I:#W  '

# Pane border styling (when you have splits)
set -g pane-border-style 'fg=#3e4452'
set -g pane-active-border-style 'fg=#61afef'
# Rename session with Prefix + r (instead of $)
bind r command-prompt -I "#S" "rename-session '%%'"
# Clipboard Sync (Universal OSC 52)
set -s set-clipboard on



#session and plugin management 
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
set -g @continuum-restore 'on'

# ==========================
# CHEAT SHEET
# ==========================
# PREFIX is [Alt+q]
#
# PANE / WINDOW
# Alt+q -> v      : Split Vertical (Top/Bottom)
# Alt+q -> s      : Split Horizontal (Left/Right)
# Alt+q -> n      : New Window
# Alt+q -> Tab    : Next Window
# Alt+q -> r      : Rename Session
# Alt+q -> d      : Detach (Minimize)
#
# COPY / SCROLL
# Alt+Up Arrow    : Enter Copy Mode
# q               : Exit Copy Mode
# v (in copy)     : Start Selection
# y (in copy)     : Yank (Copy to system clipboard)
# Alt+q -> ]      : Paste
#
# SESSION
# Alt+q -> Ctrl+s : Save Session (Resurrect)
# Alt+q -> Ctrl+r : Restore Session (Resurrect)
